  <header>
    <div class="logo">
      <img src="logo-f1.png" alt="F1 Premium" class="logo-img">
      <span class="logo-text">F1 Premium</span>
    </div>
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="nav.home">Inicio</a></li>
        <li><a href="about.html" data-i18n="nav.about">¿Qué es F1 Premium?</a></li>
        <li><a href="how-it-works.html" data-i18n="nav.how">Cómo funciona</a></li>
        <li><a href="wallet.html" data-i18n="nav.wallet">Configurar wallet</a></li>
        <li><a href="register.html" data-i18n="nav.register">Registrarse</a></li>
        <li><a href="backoffice.html" data-i18n="nav.backoffice">Back Office</a></li>
        <li><a href="faq.html" data-i18n="nav.faq">Preguntas frecuentes</a></li>

        <li><a href="legal.html" data-i18n="nav.legal">Aviso legal</a></li>
      </ul>
    </nav>
    <div class="language-selector">
      <select id="lang-select">
        <option value="es">ES</option>
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="de">DE</option>
        <option value="ar">AR</option>
        <option value="ro">RO</option>
      </select>
    </div>

  <main class="content-page">
    <h1 data-i18n="how.title"></h1>
    <p data-i18n="how.intro"></p>

    <section class="how-section">
      <h2 data-i18n="how.network.title"></h2>
      <p data-i18n="how.network.desc1"></p>

      <div class="image-row">
        <figure>
          <img src="nivel2.png" alt="Duplicación de niveles" loading="lazy">
          <figcaption data-i18n="how.network.image1.caption"></figcaption>
        </figure>
        <figure>
          <img src="nivel7.png" alt="Red completa" loading="lazy">
          <figcaption data-i18n="how.network.image2.caption"></figcaption>
        </figure>
      </div>
    </section>

    <section class="how-section">
      <h2 data-i18n="how.circuits.details.title"></h2>
      <div class="circuits-detail">
        <div class="circuit-detail">
          <h3 data-i18n="home.circuits.bronce.title"></h3>

          <figcaption data-i18n="how.cycles.title"></figcaption>

    <section class="how-section">
      <h2 data-i18n="how.automation.details.title"></h2>
