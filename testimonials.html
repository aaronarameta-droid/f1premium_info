<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="testimonials.title">Testimonios</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo-f1.png" alt="F1 Premium" class="logo-img">
      <span class="logo-text">F1 Premium</span>
    </div>
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="nav.home">Inicio</a></li>
        <li><a href="about.html" data-i18n="nav.about">¿Qué es F1 Premium?</a></li>
        <li><a href="how-it-works.html" data-i18n="nav.how">Cómo funciona</a></li>
        <li><a href="wallet.html" data-i18n="nav.wallet">Configurar wallet</a></li>
        <li><a href="register.html" data-i18n="nav.register">Registrarse</a></li>
        <li><a href="backoffice.html" data-i18n="nav.backoffice">Back Office</a></li>
        <li><a href="faq.html" data-i18n="nav.faq">Preguntas frecuentes</a></li>
        <li><a href="testimonials.html" data-i18n="nav.testimonials">Testimonios</a></li>
        <li><a href="legal.html" data-i18n="nav.legal">Aviso legal</a></li>
      </ul>
    </nav>
    <div class="language-selector">
      <select id="lang-select">
        <option value="es">ES</option>
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="de">DE</option>
        <option value="ar">AR</option>
        <option value="ro">RO</option>
      </select>
    </div>
  </header>

  <main class="content-page">
    <h1 data-i18n="testimonials.title"></h1>
    <div class="testimonials">
      <div class="testimonial-card">
        <p data-i18n="testimonial1.quote"></p>
        <p class="author"><span data-i18n="testimonial1.author"></span> – <span data-i18n="testimonial1.role"></span></p>
      </div>
      <div class="testimonial-card">
        <p data-i18n="testimonial2.quote"></p>
        <p class="author"><span data-i18n="testimonial2.author"></span> – <span data-i18n="testimonial2.role"></span></p>
      </div>
      <div class="testimonial-card">
        <p data-i18n="testimonial3.quote"></p>
        <p class="author"><span data-i18n="testimonial3.author"></span> – <span data-i18n="testimonial3.role"></span></p>
      </div>
      <div class="testimonial-card">
        <p data-i18n="testimonial4.quote"></p>
        <p class="author"><span data-i18n="testimonial4.author"></span> – <span data-i18n="testimonial4.role"></span></p>
      </div>
    </div>
    <!-- CTA after testimonials -->
    <div class="cta">
      <h2 data-i18n="home.cta.title"></h2>
      <p data-i18n="home.cta.desc"></p>
      <div class="cta-buttons">
        <a href="register.html" data-i18n="home.cta.button"></a>
      </div>
    </div>
  </main>

  <footer>
    <p data-i18n="footer.text"></p>
  </footer>

  <script src="script.js"></script>
  <script src="romanian-fix.js"></script>
</body>
</html>
