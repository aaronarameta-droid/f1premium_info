  <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo-f1.png" alt="F1 Premium" class="logo-img">
      <span class="logo-text">F1 Premium</span>
    </div>
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="nav.home">Inicio</a></li>
        <li><a href="about.html" data-i18n="nav.about">¿Qué es F1 Premium?</a></li>
        <li><a href="how-it-works.html" data-i18n="nav.how">Cómo funciona</a></li>
        <li><a href="wallet.html" data-i18n="nav.wallet">Configurar wallet</a></li>

    </nav>

      <select id="lang-select">

        <option value="ar">AR</option>
        <option value="ro">RO</option>

      <h2 data-i18n="home.cta.title"></h2>
