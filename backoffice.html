<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="backoffice.title">Back Office</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo-f1.png" alt="F1 Premium" class="logo-img">
      <span class="logo-text">F1 Premium</span>
    </div>
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="nav.home">Inicio</a></li>
        <li><a href="about.html" data-i18n="nav.about">¿Qué es F1 Premium?</a></li>
        <li><a href="how-it-works.html" data-i18n="nav.how">Cómo funciona</a></li>
        <li><a href="wallet.html" data-i18n="nav.wallet">Configurar wallet</a></li>
        <li><a href="register.html" data-i18n="nav.register">Registrarse</a></li>
        <li><a href="backoffice.html" data-i18n="nav.backoffice">Back Office</a></li>
        <li><a href="faq.html" data-i18n="nav.faq">Preguntas frecuentes</a></li>
        <li><a href="testimonials.html" data-i18n="nav.testimonials">Testimonios</a></li>
        <li><a href="legal.html" data-i18n="nav.legal">Aviso legal</a></li>
      </ul>
    </nav>
    <div class="language-selector">
      <select id="lang-select">
        <option value="es">ES</option>
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="de">DE</option>
        <option value="ar">AR</option>
        <option value="ro">RO</option>
      </select>
    </div>
  </header>

  <main class="content-page">
    <h1 data-i18n="backoffice.title"></h1>
    <p data-i18n="backoffice.intro"></p>
    <!-- Section 1: Progress and reactivation -->
    <section class="backoffice-section">
      <h2 data-i18n="backoffice.section1.title"></h2>
      <p data-i18n="backoffice.section1.desc1"></p>
      <p data-i18n="backoffice.section1.desc2"></p>
      <div class="image-row">
        <figure>
          <img src="backoffice/progress.png" alt="Progreso y reactivación" loading="lazy">
        </figure>
      </div>
    </section>

    <!-- Section 2: Circuit activation -->
    <section class="backoffice-section">
      <h2 data-i18n="backoffice.section2.title"></h2>
      <p data-i18n="backoffice.section2.desc1"></p>
      <p data-i18n="backoffice.section2.desc2"></p>
      <div class="image-row">
        <figure>
          <img src="backoffice/circuits.png" alt="Activación de circuitos" loading="lazy">
        </figure>
      </div>
    </section>

    <!-- Section 3: My account -->
    <section class="backoffice-section">
      <h2 data-i18n="backoffice.section3.title"></h2>
      <p data-i18n="backoffice.section3.desc1"></p>
      <p data-i18n="backoffice.section3.desc2"></p>
      <div class="image-row">
        <figure>
          <img src="backoffice/mi_cuenta.png" alt="Mi cuenta" loading="lazy">
        </figure>
      </div>
    </section>

    <!-- Section 4: Circuit details -->
    <section class="backoffice-section">
      <h2 data-i18n="backoffice.section4.title"></h2>
      <p data-i18n="backoffice.section4.desc1"></p>
      <p data-i18n="backoffice.section4.desc2"></p>
      <div class="image-row">
        <figure>
          <img src="backoffice/detalle_circuito.png" alt="Detalle de circuitos" loading="lazy">
        </figure>
      </div>
    </section>

    <!-- Section 5: Main menu and tools -->
    <section class="backoffice-section">
      <h2 data-i18n="backoffice.section5.title"></h2>
      <p data-i18n="backoffice.section5.desc1"></p>
      <p data-i18n="backoffice.section5.desc2"></p>
      <div class="image-row">
        <figure>
          <img src="backoffice/menu_principal.png" alt="Menú principal" loading="lazy">
        </figure>
      </div>
    </section>

    <!-- CTA to encourage registration -->
    <div class="cta">
      <h2 data-i18n="home.cta.title"></h2>
      <p data-i18n="home.cta.desc"></p>
      <div class="cta-buttons">
        <a href="register.html" data-i18n="home.cta.button"></a>
      </div>
    </div>
  </main>

  <footer>
    <p data-i18n="footer.text"></p>
  </footer>

  <script src="script.js"></script>
  <script src="romanian-fix.js"></script>
</body>
</html>
